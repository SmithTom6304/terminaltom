{{ define "main" }}
<section class="list-page">
  <div class="prompt-line">tom@terminaltom:~$ ls ./{{ .Section }}/</div>
  <div class="section-label">{{ .Title }}</div>

  {{ range .Pages }}
  <article class="post-entry">
    <a class="post-entry-link" href="{{ .Permalink }}">
      <time class="post-date">{{ .Date.Format "2006-01-02" }}</time>
      <span class="post-title">{{ .Title }}</span>
      <div class="post-excerpt">{{ .Summary | plainify | truncate 140 }}</div>
      {{ with .Params.tags }}
      <div class="tag-list">{{ range . }}<span class="tag">{{ . }}</span>{{ end }}</div>
      {{ end }}
    </a>
  </article>
  {{ end }}
</section>
{{ end }}
